# =============================================================================
# Watercooler Configuration
# =============================================================================
#
# Copy this file to:
#   - ~/.watercooler/config.toml      (user defaults)
#   - <project>/.watercooler/config.toml  (project overrides)
#
# Project settings override user settings on a per-key basis.
# Environment variables override both (see mapping below).
#
# All settings shown here are defaults - uncomment and modify as needed.
# =============================================================================

# Config schema version (do not change)
version = 1


# =============================================================================
# COMMON SETTINGS
# Shared between MCP server and Dashboard
# =============================================================================
[common]

# Threads repo URL pattern
# Placeholders: {org} = GitHub org, {repo} = code repo name, {namespace} = full path
# Env: WATERCOOLER_THREADS_PATTERN
# Default is HTTPS (works with credential helpers/tokens without SSH agent):
# threads_pattern = "https://github.com/{org}/{repo}-threads.git"
# For SSH, use: threads_pattern = "git@github.com:{org}/{repo}-threads.git"

# Simple suffix mode (alternative to pattern)
# threads_suffix = "-threads"

# Templates directory (empty = use bundled templates)
# Env: WATERCOOLER_TEMPLATES
# templates_dir = ""


# =============================================================================
# MCP SERVER SETTINGS
# Configuration for watercooler-cloud MCP server
# =============================================================================
[mcp]

# Transport mode: "stdio" (default) or "http"
# Env: WATERCOOLER_MCP_TRANSPORT
# transport = "stdio"

# HTTP server settings (only used when transport = "http")
# Env: WATERCOOLER_MCP_HOST, WATERCOOLER_MCP_PORT
# host = "127.0.0.1"
# port = 3000

# Default agent name (when not detected from client)
# Env: WATERCOOLER_AGENT
# default_agent = "Agent"

# User tag appended to agent name (e.g., "(caleb)")
# Env: WATERCOOLER_AGENT_TAG
# agent_tag = ""

# Auto-create matching threads branches when code branch is new
# Env: WATERCOOLER_AUTO_BRANCH
# auto_branch = true

# Auto-provision (create) threads repos if missing
# Env: WATERCOOLER_AUTO_PROVISION
# auto_provision = true

# Explicit threads directory (empty = auto-discover from code repo)
# Env: WATERCOOLER_DIR
# threads_dir = ""

# Base directory for threads repos (empty = parent of code repo)
# Env: WATERCOOLER_THREADS_BASE
# threads_base = ""


# -----------------------------------------------------------------------------
# Agent-Specific Overrides
# Each agent platform can have custom settings
# -----------------------------------------------------------------------------
[mcp.agents.claude-code]
name = "Claude Code"
default_spec = "implementer-code"

[mcp.agents.cursor]
name = "Cursor"
default_spec = "implementer-code"

[mcp.agents.codex]
name = "Codex"
default_spec = "planner-architecture"

[mcp.agents.gemini]
name = "Gemini"
default_spec = "general-purpose"

# Add custom agents:
# [mcp.agents.my-custom-agent]
# name = "My Agent"
# default_spec = "implementer-code"


# -----------------------------------------------------------------------------
# Git Settings
# Author info and SSH configuration for threads commits
# -----------------------------------------------------------------------------
[mcp.git]

# Git commit author (empty = use agent name)
# Env: WATERCOOLER_GIT_AUTHOR
# author = ""

# Git commit email
# Env: WATERCOOLER_GIT_EMAIL
# email = "mcp@watercooler.dev"

# Path to SSH private key (empty = use system default)
# Env: WATERCOOLER_GIT_SSH_KEY
# ssh_key = ""


# -----------------------------------------------------------------------------
# Sync Settings
# Git sync behavior and batching
# -----------------------------------------------------------------------------
[mcp.sync]

# Enable async git operations
# Env: WATERCOOLER_ASYNC_SYNC
# async = true

# Seconds to batch commits before pushing
# Env: WATERCOOLER_BATCH_WINDOW
# batch_window = 5.0

# Maximum delay before forcing push (seconds)
# max_delay = 30.0

# Maximum entries per batch commit
# max_batch_size = 50

# Maximum retry attempts for failed operations
# Env: WATERCOOLER_SYNC_MAX_RETRIES
# max_retries = 5

# Maximum backoff delay in seconds
# Env: WATERCOOLER_SYNC_MAX_BACKOFF
# max_backoff = 300.0

# Background sync interval (seconds)
# Env: WATERCOOLER_SYNC_INTERVAL
# interval = 30.0

# Seconds before considering sync stale
# stale_threshold = 60.0


# -----------------------------------------------------------------------------
# Slack Integration Settings
# Env overrides: WATERCOOLER_SLACK_WEBHOOK, WATERCOOLER_SLACK_BOT_TOKEN,
#                WATERCOOLER_SLACK_APP_TOKEN, WATERCOOLER_SLACK_CHANNEL,
#                WATERCOOLER_SLACK_CHANNEL_PREFIX
# -----------------------------------------------------------------------------
[mcp.slack]

# Slack incoming webhook URL for notifications
# Env: WATERCOOLER_SLACK_WEBHOOK
# webhook_url = ""

# Slack bot token (xoxb-...) for rich interactions
# Env: WATERCOOLER_SLACK_BOT_TOKEN
# bot_token = ""

# Slack app token (xapp-...) for socket mode
# Env: WATERCOOLER_SLACK_APP_TOKEN
# app_token = ""

# Default Slack channel for notifications
# Env: WATERCOOLER_SLACK_CHANNEL
# default_channel = ""

# Prefix for auto-created channels (e.g., "wc-" → "wc-feature-auth")
# Env: WATERCOOLER_SLACK_CHANNEL_PREFIX
# channel_prefix = ""

# Notification triggers (when to send Slack notifications)
# notify_on_say = true
# notify_on_ball_flip = true
# notify_on_status_change = true
# notify_on_handoff = true


# -----------------------------------------------------------------------------
# Logging Settings
# -----------------------------------------------------------------------------
[mcp.logging]

# Log level: DEBUG, INFO, WARNING, ERROR
# Env: WATERCOOLER_LOG_LEVEL
# level = "INFO"

# Log directory (empty = ~/.watercooler/logs)
# Env: WATERCOOLER_LOG_DIR
# dir = ""

# Maximum log file size in bytes (default 10MB)
# Env: WATERCOOLER_LOG_MAX_BYTES
# max_bytes = 10485760

# Number of backup log files to keep
# Env: WATERCOOLER_LOG_BACKUP_COUNT
# backup_count = 5

# Disable file logging (stderr only)
# Env: WATERCOOLER_LOG_DISABLE_FILE
# disable_file = false


# -----------------------------------------------------------------------------
# Graph Settings
# Baseline graph construction with summaries and embeddings for semantic search
# -----------------------------------------------------------------------------
[mcp.graph]

# Generate LLM summaries for entries on write
# Requires LLM service (Ollama, llama.cpp, etc.)
# Env: WATERCOOLER_GRAPH_SUMMARIES
generate_summaries = true

# Generate embedding vectors for entries on write
# Requires embedding service (llama.cpp, Ollama, OpenAI, etc.)
# Env: WATERCOOLER_GRAPH_EMBEDDINGS
generate_embeddings = true

# Use extractive summaries only (no LLM calls, faster but less semantic)
# Env: WATERCOOLER_GRAPH_EXTRACTIVE
# prefer_extractive = false

# LLM service endpoint for summarization
# Env: BASELINE_GRAPH_API_BASE
# summarizer_api_base = "http://localhost:11434/v1"

# LLM model for summarization
# Env: BASELINE_GRAPH_MODEL
# summarizer_model = "llama3.2:3b"

# Embedding service endpoint
# Env: EMBEDDING_API_BASE
# embedding_api_base = "http://localhost:8080/v1"

# Embedding model
# Env: EMBEDDING_MODEL
# embedding_model = "bge-m3"

# Check service availability before generation (skip gracefully if unavailable)
# When true, summary/embedding generation will only proceed if services respond
# Env: WATERCOOLER_GRAPH_AUTO_DETECT
auto_detect_services = true

# Auto-start LLM/embedding services if unavailable (requires ServerManager)
# When true, will attempt to start local servers via watercooler_memory
# Env: WATERCOOLER_AUTO_START_SERVICES
# auto_start_services = false


# =============================================================================
# DASHBOARD SETTINGS
# Configuration for watercooler-site dashboard
# =============================================================================
[dashboard]

# Pre-select this repo on dashboard load
# default_repo = ""

# Default branch for new selections
# default_branch = "main"

# Polling intervals (seconds) based on tab visibility
# poll_interval_active = 15    # Tab is focused
# poll_interval_moderate = 30  # Tab is visible but not focused
# poll_interval_idle = 60      # Tab is hidden/backgrounded

# UI preferences
# expand_threads_by_default = false
# show_closed_threads = false


# =============================================================================
# PROTOCOL VALIDATION
# Enforce Watercooler conventions and catch drift early
# =============================================================================
[validation]

# When to validate
# Env: WATERCOOLER_VALIDATE_ON_WRITE
# on_write = true
# on_commit = true

# Fail on violation (true = error, false = warn only)
# Env: WATERCOOLER_FAIL_ON_VIOLATION
# fail_on_violation = false

# What to validate
# check_branch_pairing = true
# check_commit_footers = true
# check_entry_format = true
# check_status_values = true


# -----------------------------------------------------------------------------
# Entry Format Validation
# -----------------------------------------------------------------------------
[validation.entry]

# Require agent/role/type metadata in entries
# require_metadata = true

# Valid entry roles
# allowed_roles = ["planner", "critic", "implementer", "tester", "pm", "scribe"]

# Valid entry types
# allowed_types = ["Note", "Plan", "Decision", "PR", "Closure"]

# Require Spec: field in entry body
# require_spec_field = true


# -----------------------------------------------------------------------------
# Commit Footer Validation
# -----------------------------------------------------------------------------
[validation.commit]

# Require commit footers in threads commits
# require_footers = true

# Required footer fields
# required_footer_fields = [
#     "Code-Repo",
#     "Code-Branch",
#     "Code-Commit",
#     "Watercooler-Entry-ID",
# ]


# =============================================================================
# MEMORY BACKEND CONFIGURATION
# Single source of truth for LLM and embedding settings across memory backends
# =============================================================================
[memory]

# Enable memory backends globally
# Env: WATERCOOLER_MEMORY_DISABLED (inverted: "1" = disabled)
# enabled = true

# Default memory backend: "graphiti", "leanrag", or "null"
# Env: WATERCOOLER_MEMORY_BACKEND
# backend = "graphiti"


# -----------------------------------------------------------------------------
# LLM Service Configuration (shared across backends)
# Env overrides: LLM_API_KEY, LLM_API_BASE, LLM_MODEL, LLM_TIMEOUT, LLM_MAX_TOKENS
# -----------------------------------------------------------------------------
[memory.llm]

# LLM API key (REQUIRED - set via env var for security)
# Env: LLM_API_KEY
# For local servers (Ollama, llama.cpp), use "local" or any non-empty string
# api_key = ""

# LLM API base URL
# Env: LLM_API_BASE
# Default: OpenAI (https://api.openai.com/v1)
# For Ollama: "http://localhost:11434/v1"
# api_base = "https://api.openai.com/v1"

# LLM model name
# Env: LLM_MODEL
# model = "gpt-4o-mini"

# Request timeout in seconds
# Env: LLM_TIMEOUT
# Increase for slow models or thinking models (e.g., qwen3 with /think)
# timeout = 60.0

# Maximum tokens for LLM response
# Env: LLM_MAX_TOKENS
# Increase for thinking models that need extra tokens for reasoning
# max_tokens = 512

# Summary prompt for baseline graph entry summarization
# Env: LLM_SUMMARY_PROMPT
#
# Two formats supported:
#
# 1. Simple instruction (default) - context and content appended automatically:
#    summary_prompt = "Summarize this thread entry in 1-2 sentences. Be concise and factual."
#
# 2. Template with placeholders - full control over prompt structure:
#    summary_prompt = """Given this entry:
#    {context}
#    {content}
#
#    Provide a 1-2 sentence summary focusing on key decisions and outcomes."""
#
# Variables available in template mode:
#   {context} - Entry metadata (Title: ..., Type: ...)
#   {content} - Entry body text (truncated to 2000 chars)
#
# summary_prompt = "Summarize this thread entry in 1-2 sentences. Be concise and factual."

# Thread summary prompt for baseline graph thread summarization
# Env: LLM_THREAD_SUMMARY_PROMPT
#
# Two formats supported:
#
# 1. Simple instruction (default) - title and entries appended automatically:
#    thread_summary_prompt = "Summarize this development thread in 2-3 sentences. Include the main topic, key decisions, and outcome if any."
#
# 2. Template with placeholders - full control over prompt structure:
#    thread_summary_prompt = """Thread: {title}
#
#    Entries:
#    {entries}
#
#    Summarize the above thread in 2-3 sentences."""
#
# Variables available in template mode:
#   {title} - Thread title
#   {entries} - Bullet list of entry summaries (up to max_thread_entries)
#
# thread_summary_prompt = "Summarize this development thread in 2-3 sentences. Include the main topic, key decisions, and outcome if any."


# -----------------------------------------------------------------------------
# Embedding Service Configuration (shared across backends)
# Env overrides: EMBEDDING_API_KEY, EMBEDDING_API_BASE, EMBEDDING_MODEL, EMBEDDING_DIM,
#                EMBEDDING_TIMEOUT, EMBEDDING_BATCH_SIZE
# -----------------------------------------------------------------------------
[memory.embedding]

# Embedding API key (often not required for local servers)
# Env: EMBEDDING_API_KEY
# For local servers (Ollama, llama.cpp), use "local" or any non-empty string
# api_key = ""

# Embedding API base URL
# Env: EMBEDDING_API_BASE
# Default: local llama.cpp (http://localhost:8080/v1)
# For Ollama: "http://localhost:11434/v1" (same port as LLM, different model)
# api_base = "http://localhost:8080/v1"

# Embedding model name
# Env: EMBEDDING_MODEL
# model = "bge-m3"

# Embedding vector dimension
# Env: EMBEDDING_DIM
# dim = 1024

# Request timeout in seconds
# Env: EMBEDDING_TIMEOUT
# timeout = 60.0

# Batch size for embedding requests
# Env: EMBEDDING_BATCH_SIZE
# Higher values improve throughput but increase memory usage
# batch_size = 32

# Context window size for embedding server (tokens)
# Env: EMBEDDING_CONTEXT_SIZE
# Default matches bge-m3 max context (8192). Reduce to save VRAM if needed.
# context_size = 8192


# -----------------------------------------------------------------------------
# Database Configuration (FalkorDB)
# Env overrides: FALKORDB_HOST, FALKORDB_PORT, FALKORDB_PASSWORD
# -----------------------------------------------------------------------------
[memory.database]

# FalkorDB host
# Env: FALKORDB_HOST
# host = "localhost"

# FalkorDB port
# Env: FALKORDB_PORT
# port = 6379

# FalkorDB password (optional)
# Env: FALKORDB_PASSWORD
# password = ""


# -----------------------------------------------------------------------------
# Graphiti-Specific Settings
# These override shared settings above when using the Graphiti backend
#
# IMPORTANT: Graphiti uses LLM for entity extraction, relation finding, and
# fact deduplication. This requires a capable model (gpt-4o-mini or better).
# The shared [memory.llm] and [memory.embedding] settings are used by default,
# but you can override them here if Graphiti needs different models than
# the baseline graph (e.g., OpenAI for Graphiti, local for baseline graph).
# -----------------------------------------------------------------------------
[memory.graphiti]

# Reranker algorithm for hybrid search
# Options: rrf (default, fastest), mmr, cross_encoder, node_distance, episode_mentions
# Env: WATERCOOLER_GRAPHITI_RERANKER
# reranker = "rrf"

# Track entry-episode mappings for provenance
# track_entry_episodes = true

# Override LLM settings for Graphiti only (empty = use shared [memory.llm])
# Use this when Graphiti needs a more capable model than the baseline graph.
# API key resolution: TOML > provider-specific env (OPENAI_API_KEY if api_base is openai.com)
# llm_api_key = ""  # Empty = check OPENAI_API_KEY if api_base is openai.com
# llm_api_base = "https://api.openai.com/v1"
# llm_model = "gpt-4o-mini"

# Override embedding settings for Graphiti only (empty = use shared [memory.embedding])
# Use this when Graphiti needs a different embedding model than the baseline graph.
# API key resolution: TOML > provider-specific env (OPENAI_API_KEY, VOYAGE_API_KEY, etc.)
# embedding_api_key = ""  # Empty = check provider env var based on api_base
# embedding_api_base = "https://api.openai.com/v1"
# embedding_model = "text-embedding-3-small"

# Chunking settings for entry sync
# When enabled, long entries are split into chunks before indexing to Graphiti.
# Each chunk becomes a separate episode linked via previous_episode_uuids.
# This improves retrieval by avoiding "lost in the middle" issues with long text.
#
# Enable/disable chunking during sync
# Env: WATERCOOLER_GRAPHITI_CHUNK_ON_SYNC
# chunk_on_sync = true
#
# Maximum tokens per chunk (768 balances comprehensiveness vs retrieval quality)
# Env: WATERCOOLER_GRAPHITI_CHUNK_MAX_TOKENS
# chunk_max_tokens = 768
#
# Token overlap between chunks for context continuity
# Env: WATERCOOLER_GRAPHITI_CHUNK_OVERLAP
# chunk_overlap = 64


# -----------------------------------------------------------------------------
# LeanRAG-Specific Settings
# These override shared settings above when using the LeanRAG backend
#
# IMPORTANT: LeanRAG uses LLM for triple extraction and summary generation.
# This requires a capable model (gpt-4o-mini or better).
# The shared [memory.llm] and [memory.embedding] settings are used by default,
# but you can override them here if LeanRAG needs different models.
# -----------------------------------------------------------------------------
[memory.leanrag]

# Max parallel workers for graph building
# max_workers = 8

# Override LLM settings for LeanRAG only (empty = use shared [memory.llm])
# Use this when LeanRAG needs a more capable model than the baseline graph.
# API key resolution: TOML > provider-specific env (OPENAI_API_KEY if api_base is openai.com)
# llm_api_key = ""  # Empty = check OPENAI_API_KEY if api_base is openai.com
# llm_api_base = "https://api.openai.com/v1"
# llm_model = "gpt-4o-mini"

# Override embedding settings for LeanRAG only (empty = use shared [memory.embedding])
# Use this when LeanRAG needs a different embedding model than the baseline graph.
# API key resolution: TOML > provider-specific env (OPENAI_API_KEY, VOYAGE_API_KEY, etc.)
# embedding_api_key = ""  # Empty = check provider env var based on api_base
# embedding_api_base = "https://api.openai.com/v1"
# embedding_model = "text-embedding-3-small"


# =============================================================================
# MEMORY BACKEND QUICK START
# =============================================================================
#
# To enable Graphiti memory backend:
#
#   Option 1 - TOML config (recommended):
#     [memory]
#     enabled = true
#     backend = "graphiti"
#
#     [memory.llm]
#     api_key = "local"  # For Ollama/llama.cpp
#     api_base = "http://localhost:11434/v1"
#     model = "qwen3:30b"  # or your preferred model
#
#     [memory.embedding]
#     api_key = "local"
#     api_base = "http://localhost:11434/v1"  # Ollama serves both LLM and embeddings
#     model = "nomic-embed-text:latest"
#
#   Option 2 - Environment variables:
#     WATERCOOLER_GRAPHITI_ENABLED=1  # or WATERCOOLER_MEMORY_BACKEND=graphiti
#     LLM_API_KEY=<your-api-key>
#     LLM_API_BASE=http://localhost:11434/v1
#     LLM_MODEL=qwen3:30b
#     EMBEDDING_API_KEY=<your-api-key>
#     EMBEDDING_API_BASE=http://localhost:11434/v1
#     EMBEDDING_MODEL=nomic-embed-text:latest
#
# For Ollama (local LLM + embedding on same port):
#   - Both LLM and embedding use port 11434
#   - Specify different models per service
#   - api_key = "local" (or any non-empty string)
#
# For llama.cpp (separate processes):
#   - LLM: http://localhost:8000/v1
#   - Embedding: http://localhost:8080/v1
#
# To disable all memory backends (e.g., for CI):
#   WATERCOOLER_MEMORY_DISABLED=1
#
# Priority chain (highest first):
#   Environment variables > Backend-specific TOML > Shared TOML > Defaults
#
# See docs/ENVIRONMENT_VARS.md for complete documentation.
# =============================================================================


# =============================================================================
# ENVIRONMENT VARIABLE REFERENCE
# =============================================================================
#
# Config Key                     Environment Variable
# ---------------------------    --------------------------------
# common.threads_pattern         WATERCOOLER_THREADS_PATTERN
# common.templates_dir           WATERCOOLER_TEMPLATES
# mcp.transport                  WATERCOOLER_MCP_TRANSPORT
# mcp.host                       WATERCOOLER_MCP_HOST
# mcp.port                       WATERCOOLER_MCP_PORT
# mcp.default_agent              WATERCOOLER_AGENT
# mcp.agent_tag                  WATERCOOLER_AGENT_TAG
# mcp.auto_branch                WATERCOOLER_AUTO_BRANCH
# mcp.auto_provision             WATERCOOLER_AUTO_PROVISION
# mcp.threads_dir                WATERCOOLER_DIR
# mcp.threads_base               WATERCOOLER_THREADS_BASE
# mcp.git.author                 WATERCOOLER_GIT_AUTHOR
# mcp.git.email                  WATERCOOLER_GIT_EMAIL
# mcp.git.ssh_key                WATERCOOLER_GIT_SSH_KEY
# mcp.sync.async                 WATERCOOLER_ASYNC_SYNC
# mcp.sync.batch_window          WATERCOOLER_BATCH_WINDOW
# mcp.sync.interval              WATERCOOLER_SYNC_INTERVAL
# mcp.sync.max_retries           WATERCOOLER_SYNC_MAX_RETRIES
# mcp.sync.max_backoff           WATERCOOLER_SYNC_MAX_BACKOFF
# mcp.logging.level              WATERCOOLER_LOG_LEVEL
# mcp.logging.dir                WATERCOOLER_LOG_DIR
# mcp.logging.max_bytes          WATERCOOLER_LOG_MAX_BYTES
# mcp.logging.backup_count       WATERCOOLER_LOG_BACKUP_COUNT
# mcp.logging.disable_file       WATERCOOLER_LOG_DISABLE_FILE
# mcp.graph.generate_summaries   WATERCOOLER_GRAPH_SUMMARIES
# mcp.graph.generate_embeddings  WATERCOOLER_GRAPH_EMBEDDINGS
# mcp.graph.auto_detect_services WATERCOOLER_GRAPH_AUTO_DETECT
# mcp.graph.auto_start_services  WATERCOOLER_AUTO_START_SERVICES
# validation.on_write            WATERCOOLER_VALIDATE_ON_WRITE
# validation.fail_on_violation   WATERCOOLER_FAIL_ON_VIOLATION
#
# Slack integration:
# mcp.slack.webhook_url          WATERCOOLER_SLACK_WEBHOOK
# mcp.slack.bot_token            WATERCOOLER_SLACK_BOT_TOKEN
# mcp.slack.app_token            WATERCOOLER_SLACK_APP_TOKEN
# mcp.slack.default_channel      WATERCOOLER_SLACK_CHANNEL
# mcp.slack.channel_prefix       WATERCOOLER_SLACK_CHANNEL_PREFIX
#
# Memory backend configuration:
# memory.enabled                 WATERCOOLER_MEMORY_DISABLED (inverted)
# memory.backend                 WATERCOOLER_MEMORY_BACKEND
#                                WATERCOOLER_GRAPHITI_ENABLED (legacy, use backend instead)
# memory.llm.api_key             LLM_API_KEY
# memory.llm.api_base            LLM_API_BASE
# memory.llm.model               LLM_MODEL
# memory.llm.timeout             LLM_TIMEOUT
# memory.llm.max_tokens          LLM_MAX_TOKENS
# memory.llm.summary_prompt      LLM_SUMMARY_PROMPT
# memory.llm.thread_summary_prompt LLM_THREAD_SUMMARY_PROMPT
# memory.embedding.api_key       EMBEDDING_API_KEY
# memory.embedding.api_base      EMBEDDING_API_BASE
# memory.embedding.model         EMBEDDING_MODEL
# memory.embedding.dim           EMBEDDING_DIM
# memory.embedding.timeout       EMBEDDING_TIMEOUT
# memory.embedding.batch_size    EMBEDDING_BATCH_SIZE
# memory.embedding.context_size  EMBEDDING_CONTEXT_SIZE
# memory.database.host           FALKORDB_HOST
# memory.database.port           FALKORDB_PORT
# memory.database.password       FALKORDB_PASSWORD
# memory.graphiti.reranker       WATERCOOLER_GRAPHITI_RERANKER
# memory.graphiti.chunk_on_sync  WATERCOOLER_GRAPHITI_CHUNK_ON_SYNC
# memory.graphiti.chunk_max_tokens WATERCOOLER_GRAPHITI_CHUNK_MAX_TOKENS
# memory.graphiti.chunk_overlap  WATERCOOLER_GRAPHITI_CHUNK_OVERLAP
#
# Priority (highest first): CLI args > Env vars > Project config > User config > Defaults
# =============================================================================
