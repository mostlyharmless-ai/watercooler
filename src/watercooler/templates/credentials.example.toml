# =============================================================================
# Watercooler Credentials Template
# =============================================================================
#
# This file stores secrets (API keys, tokens) separately from configuration.
# Copy to ~/.watercooler/credentials.toml and fill in your values.
#
# IMPORTANT:
#   - This file should NEVER be committed to version control
#   - Set permissions to 0600 (owner read/write only): chmod 600 credentials.toml
#   - Watercooler auto-sets secure permissions when saving
#
# Priority chain for API keys (highest first):
#   1. Environment variables (LLM_API_KEY, EMBEDDING_API_KEY)
#   2. Provider-specific env vars (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)
#   3. Provider sections in this file ([openai], [anthropic], etc.)
#
# =============================================================================


# -----------------------------------------------------------------------------
# GitHub Authentication
# Used for threads repo operations (clone, push, pull)
# -----------------------------------------------------------------------------
[github]

# GitHub personal access token (classic or fine-grained)
# Required permissions: repo (for private repos) or public_repo (for public)
# Env: GITHUB_TOKEN or GH_TOKEN
# token = "ghp_xxxxxxxxxxxxxxxxxxxx"

# SSH key path (alternative to token)
# Env: WATERCOOLER_GIT_SSH_KEY
# ssh_key = "~/.ssh/id_ed25519"


# -----------------------------------------------------------------------------
# Provider API Keys
# Store your API keys here by provider name. The system auto-detects which
# provider to use based on the api_base URL in config.toml.
# -----------------------------------------------------------------------------

# OpenAI API key
# Used when api_base contains "openai.com"
# Env: OPENAI_API_KEY
[openai]
# api_key = "sk-proj-..."

# Anthropic API key
# Used when api_base contains "anthropic.com"
# Env: ANTHROPIC_API_KEY
[anthropic]
# api_key = "sk-ant-..."

# Groq API key
# Used when api_base contains "groq.com"
# Env: GROQ_API_KEY
[groq]
# api_key = "gsk_..."

# Voyage AI API key (embeddings)
# Used when api_base contains "voyageai.com"
# Env: VOYAGE_API_KEY
[voyage]
# api_key = "vg-..."

# Google/Gemini API key
# Used when api_base contains "googleapis.com" or "generativelanguage"
# Env: GOOGLE_API_KEY or GEMINI_API_KEY
[google]
# api_key = "AIza..."

# DeepSeek API key
# Used when api_base contains "deepseek.com"
# Env: DEEPSEEK_API_KEY
# Get key: https://platform.deepseek.com/
[deepseek]
# api_key = "sk-..."

# Together.ai API key
# Used when api_base contains "together.xyz"
# Env: TOGETHER_API_KEY
# Get key: https://api.together.xyz/
[together]
# api_key = "..."

# Cohere API key
# Used when api_base contains "cohere.ai"
# Env: COHERE_API_KEY
# Get key: https://dashboard.cohere.com/
[cohere]
# api_key = "..."


# -----------------------------------------------------------------------------
# Dashboard (Self-Hosted)
# Only needed if running the watercooler-site dashboard locally
# -----------------------------------------------------------------------------
[dashboard]

# Session encryption secret for cookie security
# Generate with: openssl rand -hex 32
# session_secret = "your-secret-key"


# =============================================================================
# QUICK START EXAMPLES
# =============================================================================
#
# Example 1: OpenAI for both LLM and embeddings (recommended starting point)
#   [openai]
#   api_key = "sk-proj-your-key-here"
#
# Example 2: Anthropic for LLM, Voyage for embeddings
#   [anthropic]
#   api_key = "sk-ant-your-key-here"
#
#   [voyage]
#   api_key = "pa-your-key-here"
#
# Example 3: DeepSeek for LLM (very cheap), OpenAI for embeddings
#   [deepseek]
#   api_key = "sk-your-key-here"
#
#   [openai]
#   api_key = "sk-proj-your-key-here"
#
# Example 4: Groq for LLM (free tier), Cohere for embeddings (free tier)
#   [groq]
#   api_key = "gsk_your-key-here"
#
#   [cohere]
#   api_key = "your-key-here"
#
# Example 5: Local llama-server (no API keys needed)
#   # Just leave all [provider] sections commented out
#   # Local servers don't require authentication
#
# =============================================================================
